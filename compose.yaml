services:
  sftpgo:
    container_name: sftpgo
    image: drakkan/sftpgo:latest
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "2022:2022" # SFTP
      - "8080:8080" # Panel de administración
    volumes:
      - ./data:/srv/sftpgo
      - ./config:/var/lib/sftpgo

# Red externa para exponer panel/admin mediante proxy inverso
networks:
  default:
    external: true
    name: proxy
